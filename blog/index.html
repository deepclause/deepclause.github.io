<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepClause Blog - DeepClause Blog</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">

    <!-- Styles (going up one level to root) -->
    <link rel="stylesheet" href="../style.css">

    <style>
        .blog-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px 120px 24px;
        }

        .blog-header {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 20px;
        }

        .blog-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .blog-meta {
            font-family: var(--font-mono);
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .blog-content {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .blog-content h1,
        .blog-content h2,
        .blog-content h3 {
            font-family: var(--font-mono);
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .blog-content p {
            margin-bottom: 20px;
        }

        .blog-content pre {
            background: #1e1e1e;
            color: #eee;
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }

        .blog-content code {
            background: var(--color-surface);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }

        .blog-content pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        .blog-content a {
            color: var(--color-accent);
            text-decoration: underline;
        }

        .blog-content blockquote {
            border-left: 4px solid var(--color-accent);
            padding-left: 16px;
            margin-left: 0;
            color: rgba(17, 17, 17, 0.7);
        }
    </style>

    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
        integrity="sha384-GvrOXuhMATgEsSwCs4smul74iXGOixntILdUW9XmUC6+HX0sLNAK3q71bZl5O/6" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"
        integrity="sha384-cpW21h6RZv/phavutF+AuVYrr+dA8xD9zs6FwLpaCct6O9ctzYFfPe41llsrCG4w"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"
        integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbOxyj0O15TC4aKnfwG/gQA5A" crossorigin="anonymous"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '\\[', right: '\\]', display: true},
                {left: '\\(', right: '\\)', display: false}
            ],
            throwOnError: false
        });"></script>
</head>

                <a href="../index.html#solutions">Solutions</a>

        <article>
            <header class="blog-header">
                <h1 class="blog-title">DeepClause Blog</h1>
                <div class="blog-meta">Latest Updates</div>
            </header>

            <div class="blog-content">
                <ul class="blog-list" style="list-style: none; padding: 0;">
  <li style="margin-bottom: 20px;"><a href="2026-03-02-static-taint-analysis.html" style="font-size: 1.25rem; font-weight: bold; color: var(--color-accent); text-decoration: none;">Static taint analysis for LLM agents</a><br><small style="opacity: 0.7;">2026-03-02</small></li>
  <li style="margin-bottom: 20px;"><a href="2026-03-02-welcome.html" style="font-size: 1.25rem; font-weight: bold; color: var(--color-accent); text-decoration: none;">Welcome to the DeepClause Blog!</a><br><small style="opacity: 0.7;">2026-03-02</small></li>
</ul>
            </div>
        </article>

        <div style="margin-top: 60px;">
            <a href="index.html" style="font-weight: 700; color: var(--color-accent);">← Back to Blog</a>
        </div>
    </main>

</body>

</html>
